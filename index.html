<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brota - Planejamento Agroflorestal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { 
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif']
            },
            colors: {
              emerald: {
                50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7',
                400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857',
                800: '#065f46', 900: '#064e3b',
              }
            },
            boxShadow: { 
              'soft': '0 4px 6px -1px rgb(0 0 0 / 0.07), 0 2px 4px -2px rgb(0 0 0 / 0.07)',
              'futuristic': '0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02)'
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.45);
        --glass-border: rgba(255, 255, 255, 0.6);
      }
      
      svg { max-width: 100%; height: auto; }
      .leaflet-container { font-family: 'Inter', sans-serif; z-index: 1; border-radius: 32px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); }
      
      body {
        background-color: #fcfdfe;
        overflow-x: hidden;
      }

      /* Animated Background Blobs */
      .bg-blobs {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: -1;
        overflow: hidden;
        filter: blur(80px);
      }

      .blob {
        position: absolute;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        opacity: 0.4;
        animation: blobFloat 20s infinite alternate;
      }

      .blob-1 { background: #d1fae5; top: -10%; left: -10%; animation-delay: 0s; }
      .blob-2 { background: #ecfdf5; bottom: -10%; right: -10%; animation-delay: -5s; }
      .blob-3 { background: #f0fdf4; top: 40%; left: 30%; animation-delay: -10s; }

      @keyframes blobFloat {
        from { transform: translate(0, 0) scale(1); }
        to { transform: translate(100px, 50px) scale(1.1); }
      }

      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(24px) saturate(180%);
        -webkit-backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px 0 rgba(16, 185, 129, 0.05);
      }

      .glass-card:hover {
        background: rgba(255, 255, 255, 0.4);
        border-color: rgba(255, 255, 255, 1);
        box-shadow: 0 25px 50px -12px rgba(16, 185, 129, 0.12);
      }

      /* Modern Grid Background Pattern */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: 
          radial-gradient(circle at 1.5px 1.5px, rgba(16, 185, 129, 0.04) 1px, transparent 0);
        background-size: 32px 32px;
        z-index: -2;
        pointer-events: none;
      }

      .animate-fade-in { animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1); }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      
      .custom-scrollbar::-webkit-scrollbar { width: 5px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.1); border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(16, 185, 129, 0.3); }

      * { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, transform, box-shadow, opacity; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 400ms; }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-800 antialiased">
    <div class="bg-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
